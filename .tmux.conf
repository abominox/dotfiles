### abominox's .tmux.conf


## MISC

# Force statusline to update every second
set -g status-interval 1


# No delay for escape key
set -sg escape-time 0

# Renumber windows sequentially after closing one
set -g renumber-windows on

# Set terminal type for Vim compatibility
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

# Enable focus events for Pi session-recap extension
set -g focus-events on

# Propagate title changes to outer terminal (Ghostty)
set -g set-titles on

## HOTKEYS

# Set new panes/windows to start in your CWD
bind '%' split-window -h -c '#{pane_current_path}'  # Split panes horizontally
bind '"' split-window -v -c '#{pane_current_path}'  # Split panes vertically
bind c new-window -c '#{pane_current_path}' # Create new window

# Set pane size adjustment hotkeys (w/ prefix)
bind < resize-pane -L 5
bind > resize-pane -R 5
bind - resize-pane -D 5
bind + resize-pane -U 5

# Set hotkeys to switch windows (shift+arrow)
bind -n S-Left  previous-window
bind -n S-Right next-window

# Set hotkeys to swap windows (shift+j/l)
bind -n C-S-Left  swap-window -d -t -1
bind -n C-S-Right swap-window -d -t +1

# Set hotkeys to switch panes (alt+arrow)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Enable mouse control (for scrollback)
set -g mouse on
# extended-keys-format was added in tmux 3.5
if-shell 'tmux -V | tr -d "tmux " | awk "{exit !(\$1 >= 3.5)}"' 'set -g extended-keys-format csi-u'

## VISUAL

set -g status-justify "left"
set -g status "on"
set -g status-style bg="#1c1c1c"
set -g status-left-length "100"
set -g status-right-length "100"
set -g pane-active-border-style fg="#d7ff00"
set -g pane-border-style fg="#444444"
set -g message-style bg="#444444",fg="#eeeeee"
set -g message-command-style fg="#eeeeee"

# Zellij-style rounded pill tabs (merikan-style) — connected via shared bg
#     session      1  name    2  name      load    host
set -g status-left "#[fg=#d7ff00,bg=#1c1c1c]#[fg=#00005f,bg=#d7ff00,bold] #S #[fg=#d7ff00,bg=#1c1c1c,nobold] "
setw -g window-status-format "#[fg=#444444,bg=#1c1c1c]#[fg=#9e9e9e,bg=#444444,bold] #I #[fg=#9e9e9e,bg=#2a2a2a,nobold] #W#F #[fg=#2a2a2a,bg=#1c1c1c]"
setw -g window-status-current-format "#[fg=#d7ff00,bg=#1c1c1c]#[fg=#00005f,bg=#d7ff00,bold] #I #[fg=#d7ff00,bg=#444444,nobold] #W#F #[fg=#444444,bg=#1c1c1c]"
setw -g window-status-separator " "
set -g status-right "#[fg=#444444,bg=#1c1c1c]#[fg=#eeeeee,bg=#444444] #(cat /tmp/statusline) #[fg=#00005f,bg=#d7ff00] #h "

set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -ga update-environment COLORTERM
